basePath: /v1
definitions:
  entity.Application:
    description: Отклик жильца на свободную квартиру.
    properties:
      date:
        example: "2026-06-25T12:00:00.000Z"
        type: string
      id:
        example: app-1a2b3c4d
        type: string
      property_id:
        example: prop-z8y7x6w
        type: string
      tenant_user_id:
        example: user-a9b8c7d
        type: string
    type: object
  entity.Bill:
    description: Счет на оплату аренды и коммунальных услуг.
    properties:
      date:
        example: "2026-06-25T14:00:00.000Z"
        type: string
      due_date:
        example: "2026-07-05T00:00:00.000Z"
        type: string
      id:
        example: bill-999
        type: string
      items:
        items:
          $ref: '#/definitions/entity.BillItem'
        type: array
      property_id:
        example: prop-z8y7x6w
        type: string
      status:
        example: unpaid
        type: string
      total:
        example: 35000
        type: number
      type:
        example: rent
        type: string
    type: object
  entity.BillItem:
    description: Строка начисления в составе счета.
    properties:
      amount:
        example: 35000
        type: number
      bill_id:
        example: bill-999
        type: string
      description:
        example: Аренда за период
        type: string
      id:
        example: item-1
        type: string
    type: object
  entity.CustomNextItem:
    description: Разовое начисление, которое будет автоматически добавлено в следующий
      ежемесячный счет.
    properties:
      amount:
        example: 2500
        type: number
      description:
        example: Ремонт сантехники
        type: string
      id:
        example: custom-1
        type: string
      property_id:
        example: prop-z8y7x6w
        type: string
    type: object
  entity.Lease:
    description: 'Договор аренды: юридическая связь между квартирой и конкретным жильцом.'
    properties:
      document:
        example: Паспорт РФ 4512 № 345678
        type: string
      end_date:
        example: "2026-12-31"
        type: string
      id:
        example: lease-1a2b3c4d
        type: string
      months_of_rent:
        example: 12
        type: integer
      name:
        example: Иванов Иван Иванович
        type: string
      payment_day:
        example: 5
        type: integer
      phone:
        example: "+79991112233"
        type: string
      price:
        example: 45000
        type: number
      property_id:
        example: 7c9e6b4a-4321-4a1b-8def-abcdef123456
        type: string
      reading_day:
        example: 25
        type: integer
      start_date:
        example: "2026-01-01"
        type: string
      tenant_user_id:
        example: user-a9b8c7d
        type: string
    type: object
  entity.Property:
    properties:
      apartment:
        example: "45"
        type: string
      balance:
        example: 1250.75
        type: number
      city:
        example: Moscow
        type: string
      coordinates:
        example: 55.751244,37.618423
        type: string
      country:
        example: Russia
        type: string
      el1_tariff:
        example: 5.7
        type: number
      el2_tariff:
        example: 4.9
        type: number
      gvs_tariff:
        example: 189.5
        type: number
      house:
        example: "12"
        type: string
      hvs_tariff:
        example: 45.2
        type: number
      id:
        example: 7c9e6b4a-4321-4a1b-8def-abcdef123456
        type: string
      landlord_id:
        example: 3f7e2b1a-1234-4c56-9abc-1234567890ab
        type: string
      name:
        example: Sunny Apartment
        type: string
      region:
        example: Moscow
        type: string
      street:
        example: Tverskaya
        type: string
    type: object
  entity.PropertyDetail:
    description: 'Объект недвижимости с автоматически собранными связанными сущностями:
      показаниями счетчиков, счетами, будущими начислениями, данными аренды и арендодателя.'
    properties:
      apartment:
        example: "45"
        type: string
      applications:
        items:
          $ref: '#/definitions/entity.Application'
        type: array
      balance:
        example: 1250.75
        type: number
      bills:
        items:
          $ref: '#/definitions/entity.Bill'
        type: array
      city:
        example: Moscow
        type: string
      coordinates:
        example: 55.751244,37.618423
        type: string
      country:
        example: Russia
        type: string
      customNextItems:
        items:
          $ref: '#/definitions/entity.CustomNextItem'
        type: array
      el1_tariff:
        example: 5.7
        type: number
      el2_tariff:
        example: 4.9
        type: number
      gvs_tariff:
        example: 189.5
        type: number
      house:
        example: "12"
        type: string
      hvs_tariff:
        example: 45.2
        type: number
      id:
        example: 7c9e6b4a-4321-4a1b-8def-abcdef123456
        type: string
      landlord_id:
        example: 3f7e2b1a-1234-4c56-9abc-1234567890ab
        type: string
      landlordName:
        example: Алексей Петров
        type: string
      landlordPhone:
        example: "+79001234567"
        type: string
      name:
        example: Sunny Apartment
        type: string
      readings:
        items:
          $ref: '#/definitions/entity.Reading'
        type: array
      region:
        example: Moscow
        type: string
      street:
        example: Tverskaya
        type: string
      tenant:
        $ref: '#/definitions/entity.Lease'
    type: object
  entity.Reading:
    description: Показания приборов учета квартиры.
    properties:
      date:
        example: "2026-06-25T12:00:00.000Z"
        type: string
      el1:
        example: 340
        type: number
      el2:
        type: number
      gvs:
        example: 12.5
        type: number
      hvs:
        example: 24.1
        type: number
      id:
        example: read-123
        type: string
      is_accounted:
        example: 1
        type: integer
      property_id:
        example: prop-z8y7x6w
        type: string
    type: object
  request.CustomItem:
    properties:
      amount:
        example: 2500
        type: number
      description:
        example: Замена смесителя на кухне
        type: string
    required:
    - amount
    - description
    type: object
  request.Lease:
    properties:
      monthsOfRent:
        example: 11
        type: integer
      paymentDay:
        example: 10
        maximum: 28
        minimum: 1
        type: integer
      price:
        example: 32000
        type: number
      readingDay:
        example: 28
        maximum: 28
        minimum: 1
        type: integer
      tenantUserId:
        example: user-a9b8c7d
        type: string
    required:
    - monthsOfRent
    - paymentDay
    - price
    - readingDay
    - tenantUserId
    type: object
  request.Login:
    properties:
      email:
        example: ivan.petrov@example.com
        type: string
      password:
        example: strongPass123
        type: string
    required:
    - email
    - password
    type: object
  request.Payment:
    properties:
      amount:
        example: 35000
        type: number
      billId:
        example: bill-999
        type: string
    required:
    - amount
    type: object
  request.Profile:
    properties:
      document:
        example: 4510 123456
        type: string
      email:
        example: newemail@example.com
        type: string
      name:
        example: Ivan Kolesnikov
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: newSuperSecurePassword
        minLength: 6
        type: string
      paymentCard:
        example: "1111222233334444"
        type: string
      phone:
        example: "+79997776655"
        type: string
    type: object
  request.Property:
    properties:
      apartment:
        example: "45"
        type: string
      city:
        example: Moscow
        type: string
      coordinates:
        example: 55.751244,37.618423
        type: string
      country:
        example: Russia
        type: string
      el1Tariff:
        example: 5.7
        type: number
      el2Tariff:
        example: 4.9
        type: number
      gvsTariff:
        example: 189.5
        type: number
      house:
        example: "12"
        type: string
      hvsTariff:
        example: 45.2
        type: number
      name:
        example: Sunny Apartment
        type: string
      region:
        example: Moscow
        type: string
      street:
        example: Tverskaya
        type: string
    required:
    - apartment
    - city
    - coordinates
    - el1Tariff
    - gvsTariff
    - house
    - hvsTariff
    - name
    - region
    - street
    type: object
  request.Reading:
    properties:
      el1:
        example: 395.5
        type: number
      el2:
        example: 110.2
        type: number
      gvs:
        example: 15.2
        type: number
      hvs:
        example: 29.8
        type: number
    required:
    - el1
    - gvs
    - hvs
    type: object
  request.Register:
    properties:
      document:
        example: 4510 123456
        type: string
      email:
        example: ivan.petrov@example.com
        type: string
      initialRole:
        enum:
        - landlord
        - tenant
        example: landlord
        type: string
      name:
        example: Ivan Petrov
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: strongPass123
        minLength: 6
        type: string
      paymentCard:
        example: "1234567812345678"
        type: string
      phone:
        example: "+79161234567"
        type: string
    required:
    - email
    - initialRole
    - name
    - password
    - phone
    type: object
  response.AuthUser:
    description: Краткая информация о пользователе, возвращаемая при регистрации и
      входе.
    properties:
      email:
        example: ivanov@example.com
        type: string
      id:
        example: user-a9b8c7d
        type: string
      name:
        example: Иванов Иван Иванович
        type: string
      role:
        example: tenant
        type: string
    type: object
  response.Error:
    description: Стандартный формат ошибки API
    properties:
      error:
        example: invalid request body
        type: string
    type: object
  response.Me:
    description: Полный профиль авторизованного пользователя текущей сессии.
    properties:
      document:
        example: Паспорт РФ 4512 № 345678
        type: string
      email:
        example: ivanov@example.com
        type: string
      id:
        example: user-a9b8c7d
        type: string
      name:
        example: Иванов Иван Иванович
        type: string
      paymentCard:
        example: "4276111122223333"
        type: string
      phone:
        example: "+79991112233"
        type: string
      role:
        example: tenant
        type: string
      tenantPropertyId:
        example: prop-z8y7x6w
        type: string
    type: object
  response.PropertySummary:
    description: Краткая информация о только что созданном объекте недвижимости.
    properties:
      id:
        example: prop-k8r3f9d
        type: string
      name:
        example: Студия у метро
        type: string
    type: object
  response.TenantSummary:
    description: Краткая информация о жильце, не привязанном ни к одной квартире.
    properties:
      document:
        example: Паспорт РФ 4512 № 345678
        type: string
      email:
        example: ivanov@example.com
        type: string
      id:
        example: user-a9b8c7d
        type: string
      name:
        example: Иванов Иван Иванович
        type: string
      phone:
        example: "+79991112233"
        type: string
    type: object
info:
  contact: {}
  description: API for managing rental properties, landlords, and tenants
  title: Potom Pridumaem API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email or phone and password, and creates
        a session
      parameters:
      - description: Login data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AuthUser'
        "400":
          description: invalid request body or credentials
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Log in a user
      tags:
      - auth
  /auth/logout:
    post:
      description: Terminates the current user session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Log out a user
      tags:
      - auth
  /auth/me:
    get:
      description: Protected. Returns the full profile of the authenticated user for
        the current session, including the linked property when the caller is a tenant.
        Also triggers the lazy auto-billing check (see GET /properties) as a passive
        side effect; a billing failure is logged and does not affect this response.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Me'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Current session
      tags:
      - auth
  /auth/profile:
    post:
      consumes:
      - application/json
      description: Protected. Partially updates the authenticated user's personal
        data, including changing the password. Only the provided fields are changed.
      parameters:
      - description: Profile fields to update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Profile'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: invalid request body or email already registered
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Update account settings
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user (landlord or tenant) and immediately logs them
        in, setting the session cookie
      parameters:
      - description: Registration data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Register'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AuthUser'
        "400":
          description: invalid request body, invalid role, or email already registered
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Register a user
      tags:
      - auth
  /properties:
    get:
      description: 'Protected. Returns the caller''s properties with an automatic
        nested assembly of related entities (meter readings, bills with their line
        items, upcoming custom charges, lease/tenant info, landlord contact). Landlords
        see every property they own; tenants see the single property they lease, if
        any. The "applications" field is always empty: there is no applications/tickets
        subsystem implemented yet. Also triggers the lazy auto-billing check: for
        each active lease, if 30+ days have passed since its last rent bill (or none
        exists yet), a new bill is generated from the lease price, any queued custom
        charges, and unbilled utility consumption; a billing failure is logged and
        does not affect this response.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.PropertyDetail'
            type: array
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: List properties
      tags:
      - properties
    post:
      consumes:
      - application/json
      description: Protected, Landlord only. Creates a new rental property owned by
        the authenticated landlord, registering its address and utility tariffs (hot/cold
        water, electricity) that will later be used for billing calculations. The
        new property starts with a zero balance.
      parameters:
      - description: Property data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Property'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PropertySummary'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: landlord not found
          schema:
            $ref: '#/definitions/response.Error'
        "409":
          description: property already exists
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Create a property
      tags:
      - properties
  /properties/{id}:
    delete:
      description: Protected, Landlord only. Permanently deletes a property. Any lease
        bound to it is automatically removed as well (database cascade), unlinking
        the tenant. Only the owning landlord may delete their property.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Delete a property
      tags:
      - properties
    get:
      description: Returns a single property by ID. The property must belong to the
        authenticated landlord; a property owned by another landlord is reported as
        not found, so ownership can never be probed via this endpoint.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Property'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Get a property
      tags:
      - properties
    put:
      consumes:
      - application/json
      description: Protected, Landlord only. Updates a property's characteristics
        and utility tariffs (address, area details, hot/cold water and electricity
        tariffs). Accepts the same payload shape as property creation. Only the owning
        landlord may edit their property.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Property data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Property'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Update a property
      tags:
      - properties
  /properties/{id}/apply:
    post:
      description: Protected, Tenant only. Submits the caller's application to rent
        the given property.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: already applied to this property
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Apply for a property
      tags:
      - properties
  /properties/{id}/custom-item:
    post:
      consumes:
      - application/json
      description: Protected, Landlord only. Adds a one-off charge (e.g. cleaning,
        lock replacement) that will be folded into the property's next automatic bill.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Charge data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.CustomItem'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Add a one-off charge
      tags:
      - properties
  /properties/{id}/lease:
    delete:
      description: 'Protected, Landlord only. Terminates the property''s lease and
        unlinks the tenant. Idempotent: succeeds even if the property currently has
        no lease.'
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
