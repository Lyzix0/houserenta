basePath: /v1
definitions:
  entity.Property:
    properties:
      apartment:
        example: "45"
        type: string
      balance:
        example: 1250.75
        type: number
      city:
        example: Moscow
        type: string
      coordinates:
        example: 55.751244,37.618423
        type: string
      country:
        example: Russia
        type: string
      el1_tariff:
        example: 5.7
        type: number
      el2_tariff:
        example: 4.9
        type: number
      gvs_tariff:
        example: 189.5
        type: number
      house:
        example: "12"
        type: string
      hvs_tariff:
        example: 45.2
        type: number
      id:
        example: 7c9e6b4a-4321-4a1b-8def-abcdef123456
        type: string
      landlord_id:
        example: 3f7e2b1a-1234-4c56-9abc-1234567890ab
        type: string
      name:
        example: Sunny Apartment
        type: string
      region:
        example: Moscow
        type: string
      street:
        example: Tverskaya
        type: string
    type: object
  entity.Role:
    enum:
    - landlord
    - tenant
    - admin
    type: string
    x-enum-varnames:
    - RoleLandlord
    - RoleTenant
    - RoleAdmin
  entity.User:
    description: 'Основная модель пользователя: арендодатель, арендатор или администратор.'
    properties:
      document:
        example: 4510 123456
        type: string
      email:
        example: ivan.petrov@example.com
        type: string
      id:
        example: 3f7e2b1a-1234-4c56-9abc-1234567890ab
        type: string
      name:
        example: Ivan Petrov
        type: string
      payment_card:
        example: "1234567812345678"
        type: string
      phone:
        example: "+79161234567"
        type: string
      role:
        allOf:
        - $ref: '#/definitions/entity.Role'
        example: landlord
    type: object
  request.Login:
    properties:
      email:
        example: ivan.petrov@example.com
        type: string
      password:
        example: strongPass123
        type: string
    required:
    - email
    - password
    type: object
  request.Property:
    properties:
      apartment:
        example: "45"
        type: string
      city:
        example: Moscow
        type: string
      coordinates:
        example: 55.751244,37.618423
        type: string
      country:
        example: Russia
        type: string
      el1_tariff:
        example: 5.7
        type: number
      el2_tariff:
        example: 4.9
        type: number
      gvs_tariff:
        example: 189.5
        type: number
      house:
        example: "12"
        type: string
      hvs_tariff:
        example: 45.2
        type: number
      landlord_id:
        example: 3f7e2b1a-1234-4c56-9abc-1234567890ab
        type: string
      name:
        example: Sunny Apartment
        type: string
      region:
        example: Moscow
        type: string
      street:
        example: Tverskaya
        type: string
    required:
    - apartment
    - city
    - coordinates
    - el1_tariff
    - gvs_tariff
    - house
    - hvs_tariff
    - landlord_id
    - name
    - region
    - street
    type: object
  request.Register:
    properties:
      document:
        example: 4510 123456
        type: string
      email:
        example: ivan.petrov@example.com
        type: string
      name:
        example: Ivan Petrov
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: strongPass123
        minLength: 6
        type: string
      payment_card:
        example: "1234567812345678"
        type: string
      phone:
        example: "+79161234567"
        type: string
      role:
        enum:
        - landlord
        - tenant
        - admin
        example: landlord
        type: string
    required:
    - document
    - email
    - name
    - password
    - phone
    - role
    type: object
  response.Error:
    description: Стандартный формат ошибки API
    properties:
      error:
        example: invalid request body
        type: string
    type: object
info:
  contact: {}
  description: API for managing rental properties, landlords, and tenants
  title: Potom Pridumaem API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password, and creates a session
      parameters:
      - description: Login data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: invalid credentials
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Log in a user
      tags:
      - auth
  /auth/logout:
    post:
      description: Terminates the current user session
      produces:
      - application/json
      responses:
        "204":
          description: session terminated successfully
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Log out a user
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the user ID and role from the current session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user (landlord, tenant, or admin)
      parameters:
      - description: Registration data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Register'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: invalid request body or role
          schema:
            $ref: '#/definitions/response.Error'
        "409":
          description: user already exists
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Register a user
      tags:
      - auth
  /properties:
    get:
      description: Returns all properties owned by the currently authenticated user,
        so a landlord can see their full property portfolio. Only properties the caller
        owns are returned; other landlords' properties are never exposed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.Property'
            type: array
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: List properties
      tags:
      - properties
  /properties/{id}:
    delete:
      description: Protected, Landlord only. Permanently deletes a property. Per business
        requirements this should also automatically terminate any linked rental contracts
        and clear the rental reference for bound tenants; note that contract/tenancy
        linkage does not exist yet in this API version, so only the property record
        itself is removed for now. Only the owning landlord may delete their property.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Delete a property
      tags:
      - properties
    get:
      description: Returns a single property by ID. The property must belong to the
        authenticated landlord; a property owned by another landlord is reported as
        not found, so ownership can never be probed via this endpoint.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Property'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Get a property
      tags:
      - properties
    put:
      consumes:
      - application/json
      description: Protected, Landlord only. Updates a property's characteristics
        and utility tariffs (address, area details, hot/cold water and electricity
        tariffs). Accepts the same payload shape as property creation. Only the owning
        landlord may edit their property.
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Property data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Property'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: property not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - CookieAuth: []
      summary: Update a property
      tags:
      - properties
  /properties/property:
    post:
      consumes:
      - application/json
      description: Creates a new rental property for a landlord, registering its address
        and utility tariffs (hot/cold water, electricity) that will later be used
        for billing calculations. The new property starts with a zero balance.
      parameters:
      - description: Property data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/request.Property'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.Property'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: landlord not found
          schema:
            $ref: '#/definitions/response.Error'
        "409":
          description: property already exists
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Create a property
      tags:
      - properties
securityDefinitions:
  CookieAuth:
    description: Session cookie set on successful login
    in: cookie
    name: session_id
    type: apiKey
swagger: "2.0"
