services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${PROJECT_ROOT}/Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - renta-app
    restart: always

  renta-app:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/app/Dockerfile
    container_name: app
    environment:
      - HTTP_ADDR=:5000
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}

      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - TIME_ZONE=${TIME_ZONE}
      
      - POSTGRES_HOST=app-env-postgres
      - LOGGER_FOLDER=/app/out/logs
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5050}
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs:Z
    ports:
      - "5000:5050"
    restart: always

  frontend:
    build:
      context: ${PROJECT_ROOT}/frontend
      dockerfile: ${PROJECT_ROOT}/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/v1}
        # Same value as in `environment:` below — next.config.ts's rewrites() is
        # baked into the build at `next build` time, so this must be set here too,
        # not just at container runtime.
        - API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://renta-app:5050/v1}
    container_name: frontend
    environment:
      # Internal docker-network address: used only by the Next.js server for the
      # /api/v1/* rewrite proxy, never sent to the browser.
      - API_INTERNAL_BASE_URL=${API_INTERNAL_BASE_URL:-http://renta-app:5050/v1}
    depends_on:
      - renta-app
    ports:
      - "3000:3000"
    restart: always

  renta-app-postgres:
    image: postgres:18.4-bookworm
    container_name: app-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql:Z
    ports:
      - "5400:5432"
      
    restart: always
  
  renta-app-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations:Z


  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.26.3-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code

volumes:
  caddy_data:
  caddy_config: